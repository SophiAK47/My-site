<link rel="stylesheet" href="style.css">
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walnut Shell Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">
    
    <svg class="rubric-svg-visual" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="none">
      <opacity-mask>
        <linearGradient id="svg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.1" />
          <stop offset="100%" style="stop-color:#34495e;stop-opacity:0.15" />
        </linearGradient>
      </opacity-mask>
      <rect width="100%" height="100%" fill="url(#svg-grad)" />
      <circle cx="400" cy="300" r="250" stroke="rgba(255,255,255,0.05)" stroke-width="2" fill="none" />
      <circle cx="400" cy="300" r="350" stroke="rgba(255,255,255,0.03)" stroke-width="1" fill="none" />
    </svg>

    <div class="ui-panel">
      <div class="score-board">Round: <span id="round-val">1</span>/10</div>
      <div id="game-message">Press the button to begin!</div>
    </div>

    <div class="background-chair"></div>
    
    <div class="table-surface">
      <div id="game-board" class="game-board">
        </div>
    </div>

    <button id="start-btn">Start Round</button>

    <div id="feedback-popup" class="feedback-popup">
      <div id="feedback-emoji">🎉</div>
      <div id="feedback-text">Correct!</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
<script src="script.js"></script>
